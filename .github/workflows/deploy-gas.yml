name: Deploy GAS Web App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Code.gs"
      - "Index.html"
      - "appsscript.json"
      - ".clasp.json"
      - ".github/workflows/deploy-gas.yml"
      - "scripts/deploy-webapp.sh"
      - "package.json"
      - "package-lock.json"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
      GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure clasp auth
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLASPRC_JSON" || { echo "ERROR: CLASPRC_JSON is missing"; exit 1; }
          node <<'NODE'
          const fs = require('fs');
          const home = process.env.HOME;
          const raw = process.env.CLASPRC_JSON || '';

          function canParse(v) {
            try {
              JSON.parse(v);
              return true;
            } catch {
              return false;
            }
          }

          const candidates = [
            raw,
            raw.trim(),
            raw.replace(/^"(.*)"$/s, '$1'),
            raw.replace(/^'(.*)'$/s, '$1'),
          ];

          for (const c of candidates) {
            if (!c) continue;

            if (canParse(c)) {
              fs.writeFileSync(`${home}/.clasprc.json`, c);
              console.log('Prepared .clasprc.json (raw)');
              process.exit(0);
            }

            const unescaped = c.replace(/\\n/g, '\n').replace(/\\"/g, '"');
            if (canParse(unescaped)) {
              fs.writeFileSync(`${home}/.clasprc.json`, unescaped);
              console.log('Prepared .clasprc.json (unescaped)');
              process.exit(0);
            }

            try {
              const decoded = Buffer.from(c, 'base64').toString('utf8');
              if (canParse(decoded)) {
                fs.writeFileSync(`${home}/.clasprc.json`, decoded);
                console.log('Prepared .clasprc.json (base64 decoded)');
                process.exit(0);
              }
            } catch {}
          }

          console.error('ERROR: CLASPRC_JSON format is invalid');
          process.exit(1);
          NODE

      - name: Use fixed deployment ID (optional)
        if: ${{ env.GAS_DEPLOYMENT_ID != '' }}
        run: echo "$GAS_DEPLOYMENT_ID" > .gas-deployment-id

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          npm run deploy -- "github-actions deploy ${SHORT_SHA}"
