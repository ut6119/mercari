name: Deploy GAS Web App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Code.gs"
      - "Index.html"
      - "appsscript.json"
      - ".clasp.json"
      - ".github/workflows/deploy-gas.yml"
      - "scripts/deploy-webapp.sh"
      - "package.json"
      - "package-lock.json"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
      GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure clasp auth
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLASPRC_JSON" || { echo "ERROR: CLASPRC_JSON is missing"; exit 1; }
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          test -s "$HOME/.clasprc.json" || { echo "ERROR: failed to write ~/.clasprc.json"; exit 1; }

      - name: Use fixed deployment ID (optional)
        if: ${{ env.GAS_DEPLOYMENT_ID != '' }}
        run: echo "$GAS_DEPLOYMENT_ID" > .gas-deployment-id

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          npm run deploy -- "github-actions deploy ${SHORT_SHA}"
