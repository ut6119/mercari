name: Deploy GAS Web App
# sync-trigger

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Code.gs"
      - "Index.html"
      - "appsscript.json"
      - ".clasp.json"
      - ".github/workflows/deploy-gas.yml"
      - "scripts/deploy-webapp.sh"
      - "package.json"
      - "package-lock.json"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
      CLASPRC_JSON_B64: ${{ secrets.CLASPRC_JSON_B64 }}
      GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure clasp auth
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${CLASPRC_JSON_B64:-}" ]]; then
            printf '%s' "$CLASPRC_JSON_B64" | base64 --decode > "$HOME/.clasprc.json" || {
              echo "ERROR: CLASPRC_JSON_B64 decode failed"
              exit 1
            }
          elif [[ -n "${CLASPRC_JSON:-}" ]]; then
            printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          else
            echo "ERROR: CLASPRC_JSON or CLASPRC_JSON_B64 is required"
            exit 1
          fi

          test -s "$HOME/.clasprc.json" || { echo "ERROR: failed to write ~/.clasprc.json"; exit 1; }
          node -e "JSON.parse(require('fs').readFileSync(process.env.HOME + '/.clasprc.json','utf8'))" || {
            echo "ERROR: ~/.clasprc.json is invalid JSON"
            exit 1
          }

      - name: Use fixed deployment ID (optional)
        if: ${{ env.GAS_DEPLOYMENT_ID != '' }}
        run: echo "$GAS_DEPLOYMENT_ID" > .gas-deployment-id

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          if ! npm run deploy -- "github-actions deploy ${SHORT_SHA}" > deploy.log 2>&1; then
            tail -n 80 deploy.log || true
            ERR_MSG="$(tail -n 5 deploy.log | tr '\n' ' ' | sed -e 's/%/%25/g' -e 's/\r/%0D/g' -e 's/\n/%0A/g')"
            echo "::error title=DeployFailed::${ERR_MSG}"
            exit 1
          fi
          cat deploy.log
