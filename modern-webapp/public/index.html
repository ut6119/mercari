<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>メルカリ収支アプリ</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #ffffff;
        --line: #d8dfeb;
        --text: #1b2230;
        --muted: #5c667a;
        --accent: #2a7fff;
        --accent-2: #14b8a6;
        --danger: #cc3f59;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 8% 8%, rgba(42, 127, 255, 0.24), transparent 30%),
          radial-gradient(circle at 92% 4%, rgba(20, 184, 166, 0.2), transparent 26%),
          linear-gradient(180deg, #eef3fb 0%, #f9fbff 36%, #f4f7fb 100%);
      }
      .shell { width: min(1280px, calc(100vw - 24px)); margin: 24px auto 40px; }
      .hero, .panel {
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(216, 223, 235, 0.9);
        border-radius: 18px;
        box-shadow: 0 16px 36px rgba(15, 33, 68, 0.1);
      }
      .hero {
        position: relative;
        padding: 24px;
        background: linear-gradient(140deg, rgba(42, 127, 255, 0.11), rgba(20, 184, 166, 0.08) 58%, rgba(255, 255, 255, 0.95));
      }
      .hero-mascot {
        position: absolute;
        top: 8px;
        right: 8px;
        width: clamp(46px, 7vw, 74px);
        height: auto;
        pointer-events: none;
        user-select: none;
        filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.12));
      }
      .hero-top { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; }
      .title { margin: 0; font-size: clamp(28px, 4vw, 40px); line-height: 1; letter-spacing: -0.04em; }
      .hero-note {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        max-width: calc(100% - 86px);
        white-space: nowrap;
        overflow: visible;
        text-overflow: clip;
      }
      .auth-row {
        margin-top: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .auth-status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #1f4b99;
        background: #eaf1ff;
        border: 1px solid #c8dafc;
        border-radius: 999px;
        padding: 5px 10px;
      }
      .auth-button {
        padding: 7px 12px;
        font-size: 12px;
        border-radius: 999px;
      }
      .button, button {
        appearance: none; border: 0; border-radius: 999px; padding: 12px 18px; font-weight: 700;
        cursor: pointer; transition: transform 120ms ease, opacity 120ms ease;
      }
      .button:hover, button:hover { transform: translateY(-1px); }
      .button:disabled, button:disabled { opacity: 0.5; cursor: wait; transform: none; }
      .button-primary { background: linear-gradient(135deg, var(--accent), #2467da); color: #fff; }
      .button-secondary { background: #e8eefb; color: #23417f; }
      .button-danger { background: #fde8ee; color: var(--danger); }

      .stats { margin-top: 22px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .stat { padding: 14px; border-radius: 14px; background: #fff; border: 1px solid rgba(216, 223, 235, 0.9); }
      .stat:nth-child(1) { background: linear-gradient(135deg, #edf4ff, #fafdff); }
      .stat:nth-child(2) { background: linear-gradient(135deg, #fff6e7, #fffdf8); }
      .stat:nth-child(3) { background: linear-gradient(135deg, #eefaf7, #f8fffe); }
      .stat:nth-child(4) { background: linear-gradient(135deg, #f5f4ff, #fdfdff); }
      .stat-label { font-size: 12px; color: var(--muted); }
      .stat-value { margin-top: 6px; font-size: clamp(20px, 2.2vw, 30px); font-weight: 800; letter-spacing: -0.05em; }
      .stat-note { margin-top: 4px; font-size: 12px; color: var(--muted); }

      .view-tabs {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 14px;
        background: #e7edf8;
        border: 1px solid #d4deee;
        border-radius: 14px;
        padding: 6px;
      }
      .view-tab {
        border-radius: 10px;
        border: 0;
        background: transparent;
        color: #38455e;
        font-size: 13px;
        font-weight: 700;
        padding: 10px 12px;
      }
      .view-tab.active {
        background: #ffffff;
        color: #152033;
        box-shadow: 0 2px 7px rgba(25, 40, 68, 0.12);
      }
      .view-pane { display: none; }
      .view-pane.active { display: block; }

      .layout { display: grid; grid-template-columns: 1fr; gap: 18px; margin-top: 18px; }
      .panel { padding: 20px; }
      .panel h2 { margin: 0; font-size: 20px; }
      .panel p { margin: 8px 0 0; color: var(--muted); font-size: 13px; }

      .boards {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        order: 1;
      }
      .boards > .panel { min-width: 0; }
      #quickAddPanel { order: 2; }
      .sold-panel { background: linear-gradient(180deg, #f6f9ff 0%, #ffffff 24%); }
      .unsold-panel { background: linear-gradient(180deg, #fff9f1 0%, #ffffff 24%); }

      .board-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 14px; }
      .board-head h3 { margin: 0; font-size: 19px; }
      .board-head-right {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .board-head-action {
        padding: 5px 10px;
        font-size: 11px;
        border-radius: 999px;
      }
      .board-head span {
        color: #1f4b99;
        font-size: 11px;
        padding: 5px 10px;
        border-radius: 999px;
        background: #eaf1ff;
        border: 1px solid #c8dafc;
      }

      .table-wrap { overflow: hidden; border-radius: 16px; border: 1px solid var(--line); background: #fff; }
      table { width: 100%; border-collapse: collapse; min-width: 0; table-layout: fixed; }
      .compact-table .col-select { width: 1%; }
      .compact-table .col-name { width: 27%; }
      .compact-table .col-revenue,
      .compact-table .col-shipping,
      .compact-table .col-cost,
      .compact-table .col-profit { width: 14%; }
      .compact-table .col-rate { width: 16%; }
      .selection-mode .compact-table .col-select { width: 7%; }
      .selection-mode .compact-table .col-name { width: 24%; }
      .selection-mode .compact-table .col-revenue,
      .selection-mode .compact-table .col-shipping,
      .selection-mode .compact-table .col-cost,
      .selection-mode .compact-table .col-profit { width: 14%; }
      .selection-mode .compact-table .col-rate { width: 13%; }
      th, td {
        padding: 8px 5px;
        border-bottom: 1px solid #e8edf6;
        text-align: center;
        vertical-align: middle;
        font-size: 11px;
        white-space: nowrap;
      }
      thead tr {
        background: linear-gradient(180deg, #273447, #202a3a);
      }
      th {
        position: sticky;
        top: 0;
        background: linear-gradient(180deg, #273447, #202a3a);
        color: #fff;
        font-size: 11px;
        letter-spacing: 0.01em;
        z-index: 1;
      }
      td input {
        min-width: 0;
        padding: 7px 6px;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 9px;
        font-size: 11px;
        background: #fbfdff;
        text-align: center;
      }
      th.selection-col,
      td.selection-cell {
        width: 0;
        max-width: 0;
        padding: 0;
        border: 0;
        opacity: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .selection-cell { text-align: center; }
      .selection-cell input[type="checkbox"] {
        display: none;
        width: 16px;
        height: 16px;
      }
      .selection-mode th.selection-col,
      .selection-mode td.selection-cell {
        width: auto;
        max-width: none;
        padding: 8px 4px;
        border-bottom: 1px solid #e8edf6;
        opacity: 1;
        pointer-events: auto;
      }
      .selection-mode .selection-cell input[type="checkbox"] { display: inline-block; }
      .money, .rate, .center { text-align: center; }
      .pill {
        display: inline-flex; align-items: center; justify-content: center; min-width: 58px;
        padding: 6px 8px; border-radius: 999px; font-size: 11px; font-weight: 800;
      }
      .pill.good { background: #d9ead3; color: #1d5e2d; }
      .pill.bad { background: #f4cccc; color: #8f3030; }
      .pill.neutral { background: #ece7df; color: #595f5a; }
      .row-sold-good { background: #f5fbf6; }
      .row-sold-bad { background: #fff5f5; }
      .row-unsold { background: #fffaf0; }

      .segmented {
        display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 6px;
        background: #ece7df; border-radius: 999px; margin-top: 18px;
      }
      .segment { background: transparent; color: var(--muted); }
      .segment.active { background: #fff; color: var(--text); }
      .form-grid { display: grid; gap: 12px; margin-top: 18px; }
      .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
      .field input { width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; font: inherit; background: #fff; }
      .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .quick-add-note { margin: 6px 0 0; font-size: 12px; color: var(--muted); }

      .bulk-toolbar {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .bulk-toolbar .history-buttons {
        display: inline-flex;
        gap: 6px;
      }
      .bulk-button {
        padding: 7px 10px;
        font-size: 11px;
        border-radius: 999px;
      }
      .bulk-only { display: inline-flex; }
      .bulk-count {
        display: inline-flex;
        margin-left: auto;
        font-size: 11px;
        color: #1f4b99;
        background: #eaf1ff;
        border: 1px solid #c8dafc;
        border-radius: 999px;
        padding: 5px 10px;
      }
      .hidden { display: none; }

      .monthly-switch {
        display: inline-flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .monthly-button {
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid #c8d6ee;
        background: #eef4ff;
        color: #22457e;
        font-size: 12px;
        font-weight: 700;
      }
      .monthly-button.active {
        background: #2467da;
        border-color: #2467da;
        color: #fff;
      }
      .monthly-summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }
      .monthly-metric {
        border: 1px solid #d9e2f0;
        border-radius: 12px;
        padding: 10px 12px;
        background: #fff;
      }
      .monthly-metric-label { color: var(--muted); font-size: 11px; }
      .monthly-metric-value { margin-top: 5px; font-weight: 800; font-size: 20px; letter-spacing: -0.03em; }
      .monthly-board + .monthly-board { margin-top: 12px; }
      .monthly-board-title { margin: 0 0 8px; font-size: 16px; }
      .monthly-empty { margin: 0; font-size: 12px; color: var(--muted); }

      .chart-legend {
        display: flex;
        gap: 14px;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .chart-legend-dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
      }
      .chart-group {
        display: grid;
        gap: 12px;
      }
      .chart-row {
        display: grid;
        grid-template-columns: 74px 1fr auto;
        align-items: center;
        gap: 10px;
      }
      .chart-label { font-size: 12px; font-weight: 700; color: #26324a; }
      .chart-bars {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .chart-bar-track {
        width: 100%;
        height: 16px;
        border-radius: 999px;
        background: #edf2fb;
        overflow: hidden;
      }
      .chart-bar {
        height: 100%;
        border-radius: 999px;
      }
      .chart-bar.revenue { background: linear-gradient(90deg, #2a7fff, #4a92ff); }
      .chart-bar.profit { background: linear-gradient(90deg, #14b8a6, #21cfba); }
      .chart-bar.profit.negative { background: linear-gradient(90deg, #c75268, #df768a); }
      .chart-values { font-size: 12px; color: #3a475f; min-width: 150px; text-align: right; }

      .toast {
        position: fixed; right: 16px; bottom: 16px; padding: 14px 16px; border-radius: 14px;
        background: rgba(30, 35, 40, 0.92); color: #fff; font-size: 13px; opacity: 0;
        pointer-events: none; transform: translateY(10px); transition: opacity 140ms ease, transform 140ms ease;
      }
      .toast.show { opacity: 1; transform: translateY(0); }
      .burst-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 80;
      }
      .burst-gif {
        position: fixed;
        left: 0;
        top: 0;
        width: var(--size, 48px);
        height: var(--size, 48px);
        object-fit: contain;
        opacity: 0;
        transform: translate(-50%, -50%) scale(var(--from-scale, 0.55)) rotate(var(--from-rotate, 0deg));
        filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.12));
        animation: burst-gif-pop 1400ms cubic-bezier(0.14, 0.74, 0.22, 1) forwards;
      }
      @keyframes burst-gif-pop {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(var(--from-scale, 0.55)) rotate(var(--from-rotate, 0deg));
        }
        12% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform:
            translate(
              calc(-50% + var(--dx, 0px)),
              calc(-50% + var(--dy, -80px))
            )
            scale(var(--to-scale, 0.15))
            rotate(var(--to-rotate, 140deg));
        }
      }
      .row-focus-flash {
        animation: row-focus-flash 1500ms ease-out;
      }
      @keyframes row-focus-flash {
        0% {
          box-shadow: inset 0 0 0 2px rgba(42, 127, 255, 0.65);
          background-color: rgba(42, 127, 255, 0.1);
        }
        100% {
          box-shadow: none;
          background-color: transparent;
        }
      }

      @media (max-width: 720px) {
        .shell { width: min(100vw - 12px, 100%); margin: 12px auto 28px; }
        .hero, .panel { padding: 16px; }
        .hero-mascot { width: 48px; top: 6px; right: 6px; }
        .hero-top { flex-direction: column; }
        .hero-note { max-width: calc(100% - 58px); }
        .view-tab { font-size: 12px; padding: 9px 6px; }
        .field-row { grid-template-columns: 1fr; }
        .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
        .monthly-summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .chart-row { grid-template-columns: 56px 1fr; }
        .chart-values { grid-column: 1 / -1; text-align: left; min-width: 0; }
        th, td { padding: 6px 4px; font-size: 10px; }
        td input { padding: 6px 5px; font-size: 10px; }
        .pill { min-width: 54px; padding: 4px 6px; font-size: 10px; }
        .bulk-button { padding: 6px 8px; font-size: 10px; }
        .board-head h3 { font-size: 17px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <img id="heroMascot" class="hero-mascot" src="" alt="mascot">
        <div class="hero-top">
          <h1 class="title">メルカリ収支アプリ</h1>
        </div>
        <div class="hero-note">ホーム・月別・棒グラフを切替できます。</div>
        <div class="auth-row">
          <span id="authStatus" class="auth-status">認証: 確認中</span>
          <button class="button button-secondary auth-button" id="authLoginButton" type="button">Googleログイン</button>
          <button class="button button-secondary auth-button" id="authLogoutButton" type="button">ログアウト</button>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat-label">販売済み利益</div>
            <div class="stat-value" id="soldProfitValue">¥0</div>
            <div class="stat-note" id="soldProfitNote">0件 / 利益率 0.0%</div>
          </div>
          <div class="stat">
            <div class="stat-label">未販利益</div>
            <div class="stat-value" id="unsoldCostValue">¥0</div>
            <div class="stat-note" id="unsoldCostNote">0件 / 利益率 0.0%</div>
          </div>
          <div class="stat">
            <div class="stat-label">販売前後の合計収支</div>
            <div class="stat-value" id="overallNetValue">¥0</div>
            <div class="stat-note" id="overallNetNote">合計利益率 0.0%</div>
          </div>
          <div class="stat">
            <div class="stat-label">売上合計</div>
            <div class="stat-value" id="soldRevenueValue">¥0</div>
            <div class="stat-note" id="lastUpdatedValue">最終更新 -</div>
          </div>
        </div>
      </section>

      <div class="view-tabs" id="viewTabs">
        <button class="view-tab active" type="button" data-view-tab="home">ホーム</button>
        <button class="view-tab" type="button" data-view-tab="monthly">月別</button>
        <button class="view-tab" type="button" data-view-tab="chart">棒グラフ</button>
      </div>

      <section class="view-pane active" id="homeView">
        <div class="layout">
          <div class="boards">
            <section class="panel sold-panel" id="soldPanel">
              <div class="board-head">
                <h3>販売済み</h3>
                <div class="board-head-right">
                  <button class="button button-secondary board-head-action" id="archiveButton" type="button">前月をアーカイブ</button>
                  <span id="soldCountLabel">0件</span>
                </div>
              </div>
              <div class="bulk-toolbar" id="soldToolbar">
                <button class="button button-secondary bulk-button" type="button" data-bulk-action="toggle-selection">選択</button>
                <button class="button button-secondary bulk-button bulk-only" type="button" data-bulk-action="toggle-select-all">全選択</button>
                <button class="button button-secondary bulk-button bulk-only" type="button" data-bulk-action="to-unsold">未販へ</button>
                <button class="button button-danger bulk-button bulk-only" type="button" data-bulk-action="delete">削除</button>
                <div class="history-buttons">
                  <button class="button button-secondary bulk-button" id="soldUndoButton" type="button">戻る</button>
                  <button class="button button-secondary bulk-button" id="soldRedoButton" type="button">進む</button>
                </div>
                <span class="bulk-count bulk-only" id="soldSelectedCount">0件選択</span>
              </div>
              <div class="table-wrap">
                <table class="compact-table">
                  <colgroup>
                    <col class="col-select">
                    <col class="col-name">
                    <col class="col-revenue">
                    <col class="col-shipping">
                    <col class="col-cost">
                    <col class="col-profit">
                    <col class="col-rate">
                  </colgroup>
                  <thead>
                    <tr>
                      <th class="center selection-col">選択</th><th>名前</th><th class="center">売上</th><th class="center">送料</th>
                      <th class="center">原価</th><th class="center">利益</th><th class="center">利益率</th>
                    </tr>
                  </thead>
                  <tbody id="soldTableBody"></tbody>
                </table>
              </div>
            </section>

            <section class="panel unsold-panel" id="unsoldPanel">
              <div class="board-head">
                <h3>未販売在庫</h3>
                <div class="board-head-right">
                  <span id="unsoldCountLabel">0件</span>
                </div>
              </div>
              <div class="bulk-toolbar" id="unsoldToolbar">
                <button class="button button-secondary bulk-button" type="button" data-bulk-action="toggle-selection">選択</button>
                <button class="button button-secondary bulk-button bulk-only" type="button" data-bulk-action="toggle-select-all">全選択</button>
                <button class="button button-secondary bulk-button bulk-only" type="button" data-bulk-action="to-sold">販売済へ</button>
                <button class="button button-danger bulk-button bulk-only" type="button" data-bulk-action="delete">削除</button>
                <div class="history-buttons">
                  <button class="button button-secondary bulk-button" id="unsoldUndoButton" type="button">戻る</button>
                  <button class="button button-secondary bulk-button" id="unsoldRedoButton" type="button">進む</button>
                </div>
                <span class="bulk-count bulk-only" id="unsoldSelectedCount">0件選択</span>
              </div>
              <div class="table-wrap">
                <table class="compact-table">
                  <colgroup>
                    <col class="col-select">
                    <col class="col-name">
                    <col class="col-revenue">
                    <col class="col-shipping">
                    <col class="col-cost">
                    <col class="col-profit">
                    <col class="col-rate">
                  </colgroup>
                  <thead>
                    <tr>
                      <th class="center selection-col">選択</th><th>名前</th><th class="center">売上</th><th class="center">送料</th>
                      <th class="center">原価</th><th class="center">利益</th><th class="center">利益率</th>
                    </tr>
                  </thead>
                  <tbody id="unsoldTableBody"></tbody>
                </table>
              </div>
            </section>
          </div>

          <section class="panel" id="quickAddPanel">
            <h2>商品追加</h2>
            <p class="quick-add-note">手数料は10%固定で自動計算されます。</p>
            <div class="segmented">
              <button class="segment active" type="button" data-status-tab="unsold">未販売</button>
              <button class="segment" type="button" data-status-tab="sold">販売済み</button>
            </div>
            <form id="quickAddForm" class="form-grid">
              <div class="field">
                <label for="nameInput">名前</label>
                <input id="nameInput" name="name" type="text" placeholder="商品名">
              </div>
              <div class="field-row">
                <div class="field" id="revenueField">
                  <label for="revenueInput">売上</label>
                  <input id="revenueInput" name="revenue" type="number" min="0" step="1" placeholder="0">
                </div>
                <div class="field">
                  <label for="costInput">原価</label>
                  <input id="costInput" name="cost" type="number" min="0" step="1" placeholder="0">
                </div>
              </div>
              <div class="field">
                <label for="shippingInput">送料</label>
                <input id="shippingInput" name="shipping" type="number" min="0" step="1" value="160">
              </div>
              <button class="button button-primary" id="addButton" type="submit">追加する</button>
            </form>
          </section>
        </div>
      </section>

      <section class="view-pane" id="monthlyView">
        <div class="layout">
          <section class="panel">
            <h2>月別データ</h2>
            <div class="monthly-switch" id="monthlySwitch"></div>
            <div class="monthly-summary-grid" id="monthlySummaryGrid"></div>
            <div class="monthly-board">
              <h3 class="monthly-board-title">販売済み</h3>
              <div class="table-wrap">
                <table class="compact-table">
                  <colgroup>
                    <col class="col-name">
                    <col class="col-revenue">
                    <col class="col-shipping">
                    <col class="col-cost">
                    <col class="col-profit">
                    <col class="col-rate">
                  </colgroup>
                  <thead>
                    <tr>
                      <th>名前</th><th class="center">売上</th><th class="center">送料</th>
                      <th class="center">原価</th><th class="center">利益</th><th class="center">利益率</th>
                    </tr>
                  </thead>
                  <tbody id="monthlySoldBody"></tbody>
                </table>
              </div>
            </div>
            <div class="monthly-board">
              <h3 class="monthly-board-title">未販売在庫</h3>
              <div class="table-wrap">
                <table class="compact-table">
                  <colgroup>
                    <col class="col-name">
                    <col class="col-revenue">
                    <col class="col-shipping">
                    <col class="col-cost">
                    <col class="col-profit">
                    <col class="col-rate">
                  </colgroup>
                  <thead>
                    <tr>
                      <th>名前</th><th class="center">売上</th><th class="center">送料</th>
                      <th class="center">原価</th><th class="center">利益</th><th class="center">利益率</th>
                    </tr>
                  </thead>
                  <tbody id="monthlyUnsoldBody"></tbody>
                </table>
              </div>
            </div>
          </section>
        </div>
      </section>

      <section class="view-pane" id="chartView">
        <div class="layout">
          <section class="panel">
            <h2>月別棒グラフ</h2>
            <div class="chart-legend">
              <span><span class="chart-legend-dot" style="background:#2a7fff;"></span>売上</span>
              <span><span class="chart-legend-dot" style="background:#14b8a6;"></span>利益</span>
            </div>
            <div class="chart-group" id="monthlyChart"></div>
          </section>
        </div>
      </section>
